<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" stroke="#F58220" stroke-width="2.5"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="13" stroke="#F58220" stroke-width="2.5"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#F58220"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="6"  x2="32" y2="16" stroke="#F58220" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="58" stroke="#F58220" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="16" y2="32" stroke="#F58220" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="58" y2="32" stroke="#F58220" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tick marks on outer ring (top/bottom/left/right offset) -->
  <line x1="32" y1="17" x2="32" y2="20" stroke="#F58220" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="47" stroke="#F58220" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="32" x2="20" y2="32" stroke="#F58220" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="47" y2="32" stroke="#F58220" stroke-width="1.5" stroke-linecap="round"/>
</svg>
