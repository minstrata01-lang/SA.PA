[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # HSTS: paksa HTTPS, aman untuk semua situs Netlify
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Cegah MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Cegah clickjacking — situs tidak boleh di-embed iframe pihak lain
    X-Frame-Options = "SAMEORIGIN"
    # Batasi info referrer ke cross-origin
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Nonaktifkan API browser yang tidak dipakai
    Permissions-Policy = "accelerometer=(), camera=(), microphone=()"
    # CATATAN: CSP sengaja dihilangkan — CSP dengan unsafe-inline justru
    # membuat audit Lighthouse "CSP effective against XSS" GAGAL (▲),
    # lebih buruk daripada tidak ada CSP sama sekali (○ advisory).
    # CATATAN: COOP dihilangkan — bisa memblokir komunikasi window.opener
    # yang dipakai payment gateway Midtrans.
